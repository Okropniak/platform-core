spring:
  application:
    name: platform-core
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER_URI:}
  datasource:
    url: ${SUPABASE_JDBC_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: platform
      # Platform SQL functions called from JDBC must receive the authenticated
      # Supabase user id explicitly. Do not rely on auth.uid() in JDBC sessions.
  flyway:
    schemas: platform,billing,entitlement,usage,audit
    locations: classpath:db/migration
    default-schema: platform
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false
